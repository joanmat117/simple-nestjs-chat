<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body class="bg-black h-[100dvh] flex items-center justify-center p-0 sm:p-4">

  <div class="w-full max-w-2xl h-full sm:h-[640px] bg-[#0a0a0a] sm:rounded-xl border border-[#222] flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="px-4 sm:px-6 py-4 flex items-center justify-between border-b border-[#222]">
      <div class="flex items-center gap-3">
        <h1 class="text-white font-semibold text-base tracking-tight">Chat</h1>
        <span id="status" class="flex items-center gap-1.5 text-xs text-[#666]">
          <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-[#ef4444]"></span>
          <span id="status-text">offline</span>
        </span>
      </div>
      <span id="chat-stats" class="text-[11px] text-[#555] tabular-nums">
        <span id="total-messages">0</span> msgs · <span id="total-users">0</span> online
      </span>
    </div>

    <!-- Messages Area -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4">
      <div class="text-center text-[#444] text-sm py-12">
        No hay mensajes aún.
      </div>
    </div>

    <!-- Input Area -->
    <div class="px-4 sm:px-6 py-4 border-t border-[#222]">
      <form id="message-form" class="flex gap-2">
        <input
          type="text"
          id="message-input"
          placeholder="Escribe un mensaje..."
          class="flex-1 bg-[#111] text-white placeholder-[#555] rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-1 focus:ring-[#444] transition border border-[#222]"
          autocomplete="off"
        >
        <button
          type="submit"
          class="bg-white text-black hover:bg-[#ddd] font-medium px-5 py-3 rounded-lg text-sm transition"
        >
          →
        </button>
      </form>
    </div>

  </div>

  <script src="./main.js"></script>
</body>
</html>
